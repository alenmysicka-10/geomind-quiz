<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Wikipedia API</title></head>
<body>
<h2>Test Wikipedia API pro fotky</h2>
<p id="status">Testuji...</p>
<div id="results"></div>

<script>
const tests = [
  {name: "Helsinki Cathedral", wiki: "Helsinki_Cathedral"},
  {name: "Colosseum", wiki: "Colosseum"},
  {name: "Eiffel Tower", wiki: "Eiffel_Tower"},
  {name: "Bojnice Castle", wiki: "Bojnice_Castle"},
  {name: "Knin Fortress", wiki: "Knin_Fortress"},
  {name: "Trevi Fountain", wiki: "Trevi_Fountain"},
  {name: "Machu Picchu", wiki: "Machu_Picchu"},
];

async function test() {
  const div = document.getElementById("results");
  for (const t of tests) {
    try {
      const r = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(t.wiki), {
        headers: {Accept: "application/json"}
      });
      const d = await r.json();
      let src = d.thumbnail && d.thumbnail.source;
      if (src) src = src.replace(/\/\d+px-/, "/480px-");
      
      div.innerHTML += `<div style="margin:10px;border:1px solid #ccc;padding:10px;display:flex;gap:15px;align-items:center">
        <div>
          <b>${t.name}</b><br>
          Status: ${r.status}<br>
          ${src ? "Foto OK ✅" : "Žádná fotka ❌"}
        </div>
        ${src ? `<img src="${src}" crossorigin="anonymous" style="max-width:200px;max-height:150px;border:2px solid ${src ? "green" : "red"}" onerror="this.style.border='2px solid red';this.nextSibling.textContent=' ❌ BLOCKED'"><span></span>` : "<span style=color:red>Žádné URL</span>"}
      </div>`;
    } catch(e) {
      div.innerHTML += `<div style="color:red"><b>${t.name}</b>: CHYBA - ${e.message}</div>`;
    }
  }
  document.getElementById("status").textContent = "Hotovo!";
}
test();
</script>
</body>
</html>
